<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus — Toko Laptop Terpercaya</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<style>
  :root {
    --neon: #1d4ed8;
    --neon2: #2563eb;
    --bg: #f8fafc;
    --bg2: #ffffff;
    --bg3: #f1f5f9;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #1e293b;
    --muted: #64748b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NAVBAR */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: #ffffff;
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 64px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
  }
  .logo {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--neon);
    letter-spacing: 0px;
    text-shadow: none;
  }
  .logo span { color: #1e293b; }
  .nav-links {
    display: flex;
    gap: 2rem;
    list-style: none;
  }
  .nav-links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--neon); }
  .nav-badge {
    justify-self: end;          /* ← rata kanan */
    background: var(--neon);
    color: #fff;
    padding: 8px 16px;
    font-size: 0.8rem;
    font-weight: 600;
    border-radius: 6px;
    text-decoration: none;
    transition: background 0.2s;
  }
  .nav-badge:hover { background: #1e40af; }

  /* HERO CAROUSEL */
  .hero-carousel {
    position: relative;
    z-index: 1;
    margin-top: 64px;
    overflow: hidden;
    background: #0f172a;
    height: 480px;
  }
  .carousel-track {
    display: flex;
    height: 100%;
    transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .carousel-slide {
    min-width: 100%;
    height: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    padding: 0 6rem;
    gap: 3rem;
    position: relative;
    overflow: hidden;
  }
  .carousel-slide::before {
    content: '';
    position: absolute;
    inset: 0;
    background: inherit;
    z-index: 0;
  }
  .slide-content {
    position: relative;
    z-index: 1;
    color: #fff;
  }
  .slide-tag {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }
  .slide-brand {
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.6;
    margin-bottom: 0.5rem;
  }
  .slide-name {
    font-size: clamp(1.6rem, 3vw, 2.4rem);
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 1rem;
  }
  .slide-desc {
    font-size: 0.9rem;
    line-height: 1.7;
    opacity: 0.75;
    max-width: 400px;
    margin-bottom: 1.5rem;
  }
  .slide-specs-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 1.8rem;
  }
  .slide-spec-chip {
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 0.72rem;
    font-weight: 600;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.9);
  }
  .slide-price-row {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  .slide-price {
    font-size: 1.6rem;
    font-weight: 700;
    color: #fff;
  }
  .slide-price-old {
    font-size: 0.9rem;
    opacity: 0.5;
    text-decoration: line-through;
  }
  .slide-btns { display: flex; gap: 10px; }
  .slide-btn-primary {
    padding: 12px 24px;
    border-radius: 7px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: opacity 0.2s, transform 0.15s;
    color: #fff;
  }
  .slide-btn-primary:hover { opacity: 0.85; transform: translateY(-2px); }
  .slide-btn-outline {
    padding: 12px 24px;
    border-radius: 7px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.35);
    color: rgba(255,255,255,0.85);
    transition: background 0.2s, transform 0.15s;
  }
  .slide-btn-outline:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
  .slide-visual {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
  }
  .slide-visual img {
    max-height: 300px;
    max-width: 100%;
    object-fit: contain;
    filter: drop-shadow(0 20px 40px rgba(0,0,0,0.4));
    transition: transform 0.4s ease;
  }
  .carousel-slide:hover .slide-visual img { transform: scale(1.04) translateY(-6px); }
  .slide-bg-glow {
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.18;
    right: -80px; top: 50%;
    transform: translateY(-50%);
    z-index: 0;
  }
  /* Carousel controls */
  .carousel-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    width: 44px; height: 44px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    cursor: pointer;
    transition: background 0.2s;
    backdrop-filter: blur(4px);
  }
  .carousel-btn:hover { background: rgba(255,255,255,0.22); }
  .carousel-prev { left: 1.5rem; }
  .carousel-next { right: 1.5rem; }
  .carousel-dots {
    position: absolute;
    bottom: 1.2rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 10;
  }
  .carousel-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    cursor: pointer;
    transition: all 0.3s;
    border: none;
    padding: 0;
  }
  .carousel-dot.active {
    width: 24px;
    border-radius: 4px;
    background: #fff;
  }
  /* Floating badge */
  .slide-float-badge {
    position: absolute;
    top: 2rem;
    right: 2rem;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(8px);
    border-radius: 10px;
    padding: 12px 16px;
    text-align: center;
    z-index: 1;
  }
  .float-badge-num { font-size: 1.4rem; font-weight: 700; color: #fff; }
  .float-badge-label { font-size: 0.65rem; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 1px; }

  /* Stats bar */
  .stats-bar {
    background: #ffffff;
    border-bottom: 1px solid var(--border);
    padding: 1.2rem 2rem;
    display: flex;
    justify-content: center;
    gap: 4rem;
  }
  .stat-item { text-align: center; }
  .stat-num { font-size: 1.5rem; font-weight: 700; color: var(--neon); }
  .stat-label { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

  @media (max-width: 768px) {
    .hero-carousel { height: auto; min-height: 520px; }
    .carousel-slide { grid-template-columns: 1fr; padding: 5rem 1.5rem 4rem; text-align: center; }
    .slide-visual { display: none; }
    .slide-specs-row, .slide-btns { justify-content: center; }
    .slide-desc { margin: 0 auto 1.5rem; }
    .stats-bar { gap: 2rem; flex-wrap: wrap; }
  }

  /* SECTION */
  section {
    position: relative;
    z-index: 1;
    padding: 4rem 2rem 5rem;
    max-width: 1200px;
    margin: 0 auto;
  }
  .section-header {
    margin-bottom: 3rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .section-label {
    font-size: 0.75rem;
    color: var(--neon);
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .section-title { font-size: 1.6rem; font-weight: 700; color: var(--text); }
  .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn {
    padding: 8px 16px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--neon);
    color: var(--neon);
    background: #eff6ff;
  }

  /* PRODUCT GRID */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.5rem;
  }
  .product-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    position: relative;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    overflow: hidden;
  }
  .product-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--neon);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .product-card:hover {
    border-color: #bfdbfe;
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
  }
  .product-card:hover::before { opacity: 1; }
  .card-image {
    background: var(--bg3);
    height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .card-image svg { width: 140px; height: 100px; opacity: 0.9; }
  .badge {
    position: absolute;
    top: 12px; right: 12px;
    padding: 4px 10px;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 1px;
    border-radius: 4px;
  }
  .badge-hot { background: #ff3b5c; color: #fff; }
  .badge-new { background: var(--neon); color: #fff; }
  .badge-sale { background: var(--neon2); color: #fff; }
  .card-body { padding: 1.25rem; }
  .card-brand {
    font-size: 0.72rem;
    color: var(--neon);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .card-name {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 12px;
    line-height: 1.3;
  }
  .card-specs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .spec-chip {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.75rem;
    padding: 3px 8px;
    font-weight: 600;
    border-radius: 4px;
  }
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--border);
    padding-top: 12px;
  }
  .price { font-size: 1.05rem; font-weight: 700; color: var(--neon); }
  .price-old { font-size: 0.75rem; color: var(--muted); text-decoration: line-through; margin-top: 2px; }
  .btn-detail {
    background: var(--neon);
    border: none;
    color: #fff;
    padding: 8px 16px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    border-radius: 6px;
    transition: background 0.2s;
  }
  .btn-detail:hover { background: #1e40af; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 100%;
    max-width: 700px;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }
  .modal-top { height: 4px; background: var(--neon); border-radius: 12px 12px 0 0; }
  .modal-close {
    position: absolute;
    top: 1rem; right: 1rem;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 32px; height: 32px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 1rem;
    transition: color 0.2s;
  }
  .modal-close:hover { color: var(--text); background: #e2e8f0; }
  .modal-inner { padding: 2rem; }
  .modal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    align-items: start;
  }
  .modal-visual {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    height: 200px;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-visual svg { width: 160px; height: 110px; }
  .modal-brand {
    font-size: 0.72rem;
    color: var(--neon);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .modal-name { font-size: 1.4rem; font-weight: 700; color: var(--text); margin-bottom: 12px; line-height: 1.2; }
  .modal-price { font-size: 1.6rem; font-weight: 700; color: var(--neon); margin-bottom: 4px; }
  .modal-price-old { font-size: 0.9rem; color: var(--muted); text-decoration: line-through; margin-bottom: 16px; }
  .modal-desc { color: var(--muted); font-size: 0.9rem; line-height: 1.6; margin-bottom: 20px; }
  .modal-specs-full { border-top: 1px solid var(--border); padding-top: 1.5rem; margin-top: 1.5rem; }
  .specs-title {
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 1rem;
  }
  .specs-table { width: 100%; border-collapse: collapse; }
  .specs-table tr { border-bottom: 1px solid var(--border); }
  .specs-table td { padding: 10px 0; font-size: 0.9rem; }
  .specs-table td:first-child { color: var(--muted); font-weight: 500; width: 45%; }
  .specs-table td:last-child { color: var(--text); font-weight: 500; }
  .btn-buy {
    width: 100%;
    padding: 14px;
    background: var(--neon);
    border: none;
    color: #fff;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 1.5rem;
    transition: background 0.2s;
  }
  .btn-buy:hover { background: #1e40af; }

  /* FOOTER */
  footer {
    position: relative;
    z-index: 1;
    border-top: 1px solid var(--border);
    background: #ffffff;
    text-align: center;
    padding: 2rem;
    color: var(--muted);
    font-size: 0.85rem;
  }
  footer span { color: var(--neon); font-weight: 600; }

  @media (max-width: 640px) {
    .nav-links { display: none; }
    .modal-grid { grid-template-columns: 1fr; }
    .hero-stats { gap: 1.5rem; }
    .product-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

function renderProducts(filter) {
  const grid = document.getElementById('productGrid');
  const filtered = filter === 'all' ? products : products.filter(p => p.category === filter);
  grid.innerHTML = filtered.map(p => `
    <div class="product-card" data-category="${p.category}" onclick="openModal(${p.id})">
      <div class="card-image">
        ${p.img ? `<img src="${p.img}" alt="${p.name}" style="max-height:160px;max-width:90%;object-fit:contain;">` : laptopSVG(p.color1, p.color2)}
        ${p.badge ? `<div class="badge ${p.badgeClass}">${p.badge === 'hot' ? '🔥 TERLARIS' : p.badge === 'new' ? '✦ BARU' : '% DISKON'}</div>` : ''}
      </div>
      <div class="card-body">
        <div class="card-brand">${p.brand}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-specs">
          ${p.specs.map(s => `<span class="spec-chip">${s}</span>`).join('')}
        </div>
        <div class="card-footer">
          <div>
            <div class="price">${p.price}</div>
            ${p.priceOld ? `<div class="price-old">${p.priceOld}</div>` : ''}
          </div>
          <button class="btn-detail">Detail →</button>
        </div>
      </div>
    </div>
  `).join('');
}

function filterProducts(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderProducts(cat);
}

function openModal(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  document.getElementById('modalContent').innerHTML = `
    <div class="modal-grid">
      <div class="modal-visual">${p.img ? `<img src="${p.img}" alt="${p.name}" style="max-height:180px;max-width:90%;object-fit:contain;">` : laptopSVG(p.color1, p.color2)}</div>
      <div>
        <div class="modal-brand">${p.brand}</div>
        <div class="modal-name">${p.name}</div>
        <div class="modal-price">${p.price}</div>
        ${p.priceOld ? `<div class="modal-price-old">${p.priceOld}</div>` : ''}
        <div class="modal-desc">${p.desc}</div>
        <div class="card-specs">
          ${p.specs.map(s => `<span class="spec-chip">${s}</span>`).join('')}
        </div>
      </div>
    </div>
    <div class="modal-specs-full">
      <div class="specs-title">// Spesifikasi Lengkap</div>
      <table class="specs-table">
        ${p.fullSpecs.map(([k,v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('')}
      </table>
    </div>
    <button class="btn-buy" onclick="alert('Fitur pembelian segera hadir! Hubungi WA: 0812-3456-7890')">
      ⚡ Beli Sekarang — ${p.price}
    </button>
  `;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

let currentSlide = 0;
let autoSlideTimer = null;

function buildCarousel() {
  const track = document.getElementById('carouselTrack');
  const dots = document.getElementById('carouselDots');

  track.innerHTML = carouselSlides.map(s => {
    const specsHtml = s.specs.map(sp => '<span class="slide-spec-chip">' + sp + '</span>').join('');
    const priceOldHtml = s.priceOld ? '<span class="slide-price-old">' + s.priceOld + '</span>' : '';
    return '<div class="carousel-slide" style="background: ' + s.bg + ';">' +
      '<div class="slide-bg-glow" style="background: ' + s.glow + ';"></div>' +
      '<div class="slide-float-badge" style="top:1.5rem; right:2rem;">' +
        '<div class="float-badge-num" style="color:' + s.accentColor + '">' + s.floatNum + '</div>' +
        '<div class="float-badge-label">' + s.floatLabel + '</div>' +
      '</div>' +
      '<div class="slide-content">' +
        '<div class="slide-tag" style="background:' + s.tagColor + '22; color:' + s.tagColor + '; border:1px solid ' + s.tagColor + '55;">' + s.tag + '</div>' +
        '<div class="slide-brand" style="color:' + s.accentColor + ';">' + s.brand + '</div>' +
        '<div class="slide-name">' + s.name + '</div>' +
        '<div class="slide-desc">' + s.desc + '</div>' +
        '<div class="slide-specs-row">' + specsHtml + '</div>' +
        '<div class="slide-price-row"><span class="slide-price">' + s.price + '</span>' + priceOldHtml + '</div>' +
        '<div class="slide-btns">' +
          '<button class="slide-btn-primary" data-open-modal="' + s.productId + '" style="background:' + s.accentColor + '; color:#0f172a;">Lihat Detail \u2192</button>' +
          '<button class="slide-btn-outline" data-scroll-products="1">Semua Produk</button>' +
        '</div>' +
      '</div>' +
      '<div class="slide-visual"><img src="' + s.img + '" alt="' + s.name + '" loading="lazy"></div>' +
    '</div>';
  }).join('');

  // Event delegation — satu listener untuk semua tombol carousel
  track.addEventListener('click', function(e) {
    var btnDetail = e.target.closest('[data-open-modal]');
    var btnScroll = e.target.closest('[data-scroll-products]');
    if (btnDetail) {
      e.stopPropagation();
      openModal(parseInt(btnDetail.getAttribute('data-open-modal')));
    }
    if (btnScroll) {
      e.stopPropagation();
      document.querySelector('section').scrollIntoView({ behavior: 'smooth' });
    }
  });

  dots.innerHTML = carouselSlides.map(function(_, i) {
    return '<button class="carousel-dot ' + (i === 0 ? 'active' : '') + '" data-slide="' + i + '"></button>';
  }).join('');

  dots.addEventListener('click', function(e) {
    var dot = e.target.closest('[data-slide]');
    if (dot) { resetAutoSlide(); goToSlide(parseInt(dot.getAttribute('data-slide'))); }
  });

  startAutoSlide();
}

function goToSlide(idx) {
  currentSlide = (idx + carouselSlides.length) % carouselSlides.length;
  document.getElementById('carouselTrack').style.transform = `translateX(-${currentSlide * 100}%)`;
  document.querySelectorAll('.carousel-dot').forEach((d, i) => d.classList.toggle('active', i === currentSlide));
}

function carouselMove(dir) {
  resetAutoSlide();
  goToSlide(currentSlide + dir);
}

function startAutoSlide() {
  autoSlideTimer = setInterval(() => goToSlide(currentSlide + 1), 4500);
}

function resetAutoSlide() {
  clearInterval(autoSlideTimer);
  startAutoSlide();
}

// Touch/swipe support
let touchStartX = 0;
document.getElementById('heroCarousel').addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.getElementById('heroCarousel').addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) carouselMove(diff > 0 ? 1 : -1);
});
